name: Update Test Metrics

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Make metrics script executable
        run: chmod +x ./metrics/test-metrics.sh

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Generate metrics
        run: ./metrics/test-metrics.sh

      - name: Commit updated metrics if changed
        if: github.event_name != 'pull_request'
        run: |
          if [ ! -f docs/data.json ]; then
            echo "docs/data.json not found"
            exit 1
          fi

          if git status --porcelain -- docs/data.json | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add docs/data.json
            git commit -m "chore(metrics): update test metrics"
            git push
          else
            echo "No changes in docs/data.json"
          fi